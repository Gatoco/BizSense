<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizSense - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="sidebar-container"></div>

    <main class="content">
        <div class="page-header">
            <h2>Dashboard</h2>
            <p>Resumen general del sistema</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Datasets cargados</div>
                <div class="stat-value" id="stat-datasets">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Entrenamientos totales</div>
                <div class="stat-value" id="stat-trainings">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Modelos implementados</div>
                <div class="stat-value" id="stat-models">0</div>
            </div>
        </div>

        <div class="card" id="last-training-card">
            <div class="card-title">Ultimo entrenamiento</div>
            <div id="last-training-content">
                <div class="empty-state">
                    <p>No hay entrenamientos registrados</p>
                    <a href="graphics.html" class="btn btn-primary">Ir a Funcion Grafica</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Acceso rapido</div>
            <div class="quick-actions">
                <a href="data.html" class="quick-action">
                    <div class="qa-icon">[+]</div>
                    <div class="qa-label">Subir CSV</div>
                </a>
                <a href="graphics.html" class="quick-action">
                    <div class="qa-icon">[>]</div>
                    <div class="qa-label">Entrenar modelo</div>
                </a>
                <a href="models.html" class="quick-action">
                    <div class="qa-icon">[M]</div>
                    <div class="qa-label">Ver modelos</div>
                </a>
            </div>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
