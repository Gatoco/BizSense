<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizSense - Configuracion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar-container"></div>

    <main class="content">
        <div class="page-header">
            <h2>Configuracion</h2>
            <p>Parametros globales del sistema</p>
        </div>

        <div class="card">
            <div class="card-title">Parametros de entrenamiento</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Alpha default (tasa de aprendizaje)</label>
                    <input type="number" id="default-alpha" class="form-input" value="0.01" step="0.001" min="0.0001">
                </div>
                <div class="form-group">
                    <label>Iteraciones default</label>
                    <input type="number" id="default-iterations" class="form-input" value="100" step="10" min="10" max="1000">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Apariencia</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tema</label>
                    <select id="theme" class="form-select">
                        <option value="dark">Oscuro</option>
                        <option value="light">Claro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Idioma</label>
                    <select id="language" class="form-select">
                        <option value="es">Espanol</option>
                        <option value="en">Ingles</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Asistente IA</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Proveedor de IA</label>
                    <select id="ai-provider" class="form-select">
                        <option value="auto">Auto (detectar)</option>
                        <option value="ollama">Ollama</option>
                        <option value="lmstudio">LM Studio</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Modelo</label>
                    <select id="ai-model" class="form-select">
                        <option value="">Auto (usar modelo activo)</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Endpoint personalizado (opcional)</label>
                <input type="text" id="ai-endpoint" class="form-input" placeholder="http://localhost:11434">
            </div>
            <p class="text-muted" style="font-size: 0.85rem;">
                Modelos recomendados (livianos):<br>
                - qwen2.5:0.5b (mas rapido, ~500MB)<br>
                - qwen2.5:1.5b (recomendado, ~1.5GB)<br>
                - tinyllama:1.1b (~1.1GB)<br>
                - gemma-2-2b (~2GB)
            </p>
        </div>

        <button id="save-btn" class="btn btn-primary">Guardar configuracion</button>
        <span id="save-status" class="text-primary hidden" style="margin-left: 16px;">Guardado</span>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/config.js"></script>
</body>
</html>
